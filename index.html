<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Every Teardrop 歌詞挑戰 v4</title>
    <style>
        /* 核心佈局修正：強制直通 (passthrough) */
        body { font-family: 'Microsoft JhengHei', -apple-system, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; overscroll-behavior: none; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; position: relative; display: flex; flex-direction: column; height: auto; margin-bottom: 20px; }
        
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        
        .score-box { font-size: 1em; margin-bottom: 15px; color: #555; background: #eef; padding: 8px; border-radius: 10px; }
        .question { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; min-height: 70px; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .ipa { font-size: 0.7em; color: #888; font-weight: normal; margin-top: 5px; }
        .pos { color: #1a73e8; font-size: 0.8em; font-style: italic; margin-right: 5px; }
        
        /* 選項容器強制直通渲染 */
        #options-area { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 15px; min-height: 200px; }
        
        .option-btn { padding: 15px; font-size: 1em; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .option-btn:active { background: #f0f0f0; }
        
        .start-btn { background: #4285f4 !important; color: white !important; border: none !important; padding: 20px; font-size: 1.5em; font-weight: bold; border-radius: 15px; cursor: pointer; width: 80%; text-decoration: none; }
        .next-btn { background: #34a853 !important; color: white !important; border: none !important; padding: 18px; font-weight: bold; margin-bottom: 10px; font-size: 1.2em; display: none; border-radius: 12px; text-decoration: none; }
        .exit-btn { background: #ff4757 !important; color: white !important; border: none !important; padding: 12px; font-weight: bold; border-radius: 12px; font-size: 1em; cursor: pointer; width: 100%; text-decoration: none; }
        
        .correct { border-color: #2ecc71 !important; background: #e8f5e9 !important; color: #27ae60 !important; font-weight: bold; }
        .wrong { border-color: #e74c3c !important; background: #ffebee !important; color: #c0392b !important; }
        #feedback { margin-bottom: 10px; font-weight: bold; height: 20px; font-size: 1em; color: red; }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <h2 style="color:#4285f4; margin-top:0;">Every Teardrop<br>歌詞挑戰 v4</h2>
        <p style="color:#666;">強制直通版 (Passthrough)</p>
        <button id="real-start-btn" class="start-btn">開始挑戰 🚀</button>
    </div>

    <div id="main-game">
        <div class="score-box">答對數 / 總題數: <span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <div class="question">
            <div id="q-text">載入中...</div>
            <div id="q-ipa" class="ipa"></div>
        </div>
        
        <div id="options-area"></div>
        
        <div id="feedback"></div>
        <button id="next-button" class="next-btn">繼續下一題 ➔</button>
        <button id="exit-button" class="exit-btn">結束練習 🏁</button>
        
        <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
            <label style="font-size:0.9em; cursor: pointer;"><input type="checkbox" id="voice-toggle" checked> 🔊 語音</label>
        </div>
    </div>
</div>

<script type="text/javascript">
(function() {
    const vocabData = [
        { en: "Favorite", pos: "adj.", ipa: "/ˈfeɪvərɪt/", zh: "最喜愛的" },
        { en: "In the black", pos: "phr.", ipa: "/ɪn ðə blæk/", zh: "身處黑暗/處於盈利" },
        { en: "Shut the world outside", pos: "phr.", ipa: "/ʃʌt ðə wɜːrld ˌaʊtˈsaɪd/", zh: "將世界關在門外" },
        { en: "On a roll", pos: "phr.", ipa: "/ɒn ə roʊl/", zh: "氣勢正旺/進展順利" },
        { en: "Alight", pos: "adj.", ipa: "/əˈlaɪt/", zh: "照亮的/燃燒著的" },
        { en: "Rubble", pos: "n.", ipa: "/ˈrʌbl/", zh: "瓦礫/碎石殘骸" },
        { en: "Rebel", pos: "adj./n.", ipa: "/ˈrebl/", zh: "反抗的/造反者" },
        { en: "Comma", pos: "n.", ipa: "/ˈkɒmə/", zh: "逗號" },
        { en: "Full stop", pos: "n.", ipa: "/fʊl stɒp/", zh: "句點/終點" },
        { en: "Trapeze", pos: "n.", ipa: "/trəˈpiːz/", zh: "高空鞦韆" },
        { en: "Cathedral", pos: "n.", ipa: "/kəˈθiːdrəl/", zh: "大教堂" },
        { en: "Siren", pos: "n.", ipa: "/ˈsaɪrən/", zh: "警笛/汽笛" },
        { en: "Symphony", pos: "n.", ipa: "/ˈsɪmfəni/", zh: "交響樂" },
        { en: "Emerge", pos: "v.", ipa: "/iˈmɜːrdʒ/", zh: "浮現/走出來" },
        { en: "Raise the flag", pos: "phr.", ipa: "/reɪz ðə flæɡ/", zh: "升起旗幟/不屈服" },
        { en: "Generation", pos: "n.", ipa: "/ˌdʒenəˈreɪʃn/", zh: "世代" },
        { en: "Blink", pos: "v.", ipa: "/blɪŋk/", zh: "眨眼" },
        { en: "Soar", pos: "v.", ipa: "/sɔːr/", zh: "翱翔/飛揚" },
        { en: "Waterfall", pos: "n.", ipa: "/ˈwɔːtərfɔːl/", zh: "瀑布" },
        { en: "Pulse", pos: "n.", ipa: "/pʌls/", zh: "脈搏/律動" }
    ];

    let score = 0, total = 0, currentItem = {}, enToZh = true, hasErrored = false;

    // 強制點擊以解鎖語音與遊戲邏輯
    document.getElementById('real-start-btn').addEventListener('click', function() {
        document.getElementById('start-screen').style.display = 'none';
        renderQuestion();
    });

    document.getElementById('next-button').addEventListener('click', renderQuestion);
    document.getElementById('exit-button').addEventListener('click', function() {
        const rate = total === 0 ? 0 : Math.round((score / total) * 100);
        alert(`測驗結束！\n得分：${score} / ${total}\n正確率：${rate}%`);
        location.reload();
    });

    function renderQuestion() {
        const area = document.getElementById('options-area');
        
        document.getElementById('next-button').style.display = 'none';
        document.getElementById('exit-button').style.display = 'block';
        document.getElementById('feedback').innerText = '';
        hasErrored = false;
        
        enToZh = Math.random() > 0.5;
        currentItem = vocabData[Math.floor(Math.random() * vocabData.length)];

        document.getElementById('q-text').innerHTML = enToZh ? `<span class="pos">${currentItem.pos}</span>${currentItem.en}` : currentItem.zh;
        document.getElementById('q-ipa').innerText = enToZh ? currentItem.ipa : "";

        if (document.getElementById('voice-toggle').checked) speak(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');

        let opts = [currentItem];
        while(opts.length < 5) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        // 清空選項容器
        area.innerHTML = '';
        // 強制強力渲染：確保這部分代碼能成功生成 DOM 元素
        for (let i = 0; i < opts.length; i++) {
            (function(index) {
                const o = opts[index];
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = enToZh ? o.zh : `<span><span class="pos">${o.pos}</span>${o.en}</span><span class="ipa">${o.ipa}</span>`;
                
                btn.onclick = function() {
                    if (o === currentItem) {
                        btn.classList.add('correct');
                        document.getElementById('feedback').innerText = "✅ 正確！";
                        if (!hasErrored) score++;
                        total++;
                        document.getElementById('correct-count').innerText = score;
                        document.getElementById('total-count').innerText = total;
                        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                        document.getElementById('next-button').style.display = 'block';
                        document.getElementById('exit-button').style.display = 'none';
                        if (document.getElementById('voice-toggle').checked) speak(enToZh ? currentItem.zh : currentItem.en, enToZh ? 'zh' : 'en');
                    } else {
                        btn.classList.add('wrong');
                        btn.disabled = true;
                        hasErrored = true;
                        document.getElementById('feedback').innerText = "❌ 再試一次！";
                    }
                };
                area.appendChild(btn);
            })(i);
        }
    }

    function speak(txt, lang) {
        if (!('speechSynthesis' in window)) return;
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = lang === 'en' ? 'en-US' : 'zh-TW';
        window.speechSynthesis.speak(u);
    }
})();
</script>
</body>
</html>
