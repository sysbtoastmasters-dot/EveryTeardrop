<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Every Teardrop 歌詞挑戰</title>
    <style>
        body { font-family: 'Microsoft JhengHei', -apple-system, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; position: relative; min-height: 400px; }
        
        /* 初始遮罩層 */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        
        .score-box { font-size: 1.1em; margin-bottom: 20px; color: #555; background: #eef; padding: 10px; border-radius: 10px; }
        .question { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; min-height: 80px; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ipa { font-size: 0.7em; color: #888; font-weight: normal; margin-top: 5px; display: block; }
        .pos { color: #1a73e8; font-size: 0.8em; font-style: italic; margin-right: 5px; }
        .options { display: grid; gap: 10px; width: 100%; }
        
        button { padding: 15px; font-size: 1em; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; width: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; }
        .start-btn { background: #4285f4; color: white; border: none; padding: 20px; font-size: 1.5em; font-weight: bold; border-radius: 15px; cursor: pointer; }
        .next-btn { background: #34a853; color: white; border: none; padding: 18px; font-weight: bold; margin-top: 15px; font-size: 1.2em; display: none; }
        .exit-btn { background: #ff4757; color: white; border: none; padding: 15px; font-weight: bold; margin-top: 15px; border-radius: 12px; }
        
        .correct { border-color: #2ecc71 !important; background: #e8f5e9 !important; color: #27ae60; }
        .wrong { border-color: #e74c3c !important; background: #ffebee !important; color: #c0392b; }
        #feedback { margin-top: 15px; font-weight: bold; height: 25px; }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <h2 style="color:#4285f4; margin-top:0;">Every Teardrop<br>歌詞單字挑戰</h2>
        <p style="color:#666;">手機版優化：點擊下方開始</p>
        <button id="real-start-btn" class="start-btn">開始挑戰 🚀</button>
    </div>

    <div id="main-game">
        <div class="score-box">答對數 / 總題數: <span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <div class="question">
            <div id="q-text">準備中...</div>
            <div id="q-ipa" class="ipa"></div>
        </div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-button" class="next-btn">繼續下一題 ➔</button>
        <button id="exit-button" class="exit-btn">結束練習 🏁</button>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <label style="cursor:pointer;"><input type="checkbox" id="voice-toggle" checked> 🔊 語音開啟</label>
        </div>
    </div>
</div>

<script>
    const vocabData = [
        { en: "Favorite", pos: "adj.", ipa: "/ˈfeɪvərɪt/", zh: "最喜愛的" },
        { en: "In the black", pos: "phr.", ipa: "/ɪn ðə blæk/", zh: "身處黑暗/處於盈利" },
        { en: "Shut the world outside", pos: "phr.", ipa: "/ʃʌt ðə wɜːrld ˌaʊtˈsaɪd/", zh: "將世界關在門外" },
        { en: "On a roll", pos: "phr.", ipa: "/ɒn ə roʊl/", zh: "氣勢正旺/進展順利" },
        { en: "Alight", pos: "adj.", ipa: "/əˈlaɪt/", zh: "照亮的/燃燒著的" },
        { en: "Rubble", pos: "n.", ipa: "/ˈrʌbl/", zh: "瓦礫/碎石殘骸" },
        { en: "Rebel", pos: "adj./n.", ipa: "/ˈrebl/", zh: "反抗的/造反者" },
        { en: "Comma", pos: "n.", ipa: "/ˈkɒmə/", zh: "逗號" },
        { en: "Full stop", pos: "n.", ipa: "/fʊl stɒp/", zh: "句點/終點" },
        { en: "Trapeze", pos: "n.", ipa: "/trəˈpiːz/", zh: "高空鞦韆" },
        { en: "Cathedral", pos: "n.", ipa: "/kəˈθiːdrəl/", zh: "大教堂" },
        { en: "Siren", pos: "n.", ipa: "/ˈsaɪrən/", zh: "警笛/汽笛" },
        { en: "Symphony", pos: "n.", ipa: "/ˈsɪmfəni/", zh: "交響樂" },
        { en: "Emerge", pos: "v.", ipa: "/iˈmɜːrdʒ/", zh: "浮現/走出來" },
        { en: "Raise the flag", pos: "phr.", ipa: "/reɪz ðə flæɡ/", zh: "升起旗幟/不屈服" },
        { en: "Generation", pos: "n.", ipa: "/ˌdʒenəˈreɪʃn/", zh: "世代" },
        { en: "Blink", pos: "v.", ipa: "/blɪŋk/", zh: "眨眼" },
        { en: "Soar", pos: "v.", ipa: "/sɔːr/", zh: "翱翔/飛揚" },
        { en: "Waterfall", pos: "n.", ipa: "/ˈwɔːtərfɔːl/", zh: "瀑布" },
        { en: "Pulse", pos: "n.", ipa: "/pʌls/", zh: "脈搏/律動" }
    ];

    let score = 0, total = 0, currentItem = {}, enToZh = true, hasErrored = false;

    // 強制綁定按鈕事件
    document.getElementById('real-start-btn').addEventListener('click', function() {
        document.getElementById('start-screen').style.display = 'none';
        score = 0; total = 0;
        renderQuestion();
    });

    document.getElementById('next-button').addEventListener('click', renderQuestion);
    document.getElementById('exit-button').addEventListener('click', function() {
        const rate = total === 0 ? 0 : Math.round((score / total) * 100);
        alert(`測驗統計：\n得分：${score} / ${total}\n正確率：${rate}%`);
        location.reload();
    });

    function renderQuestion() {
        document.getElementById('next-button').style.display = 'none';
        document.getElementById('exit-button').style.display = 'block';
        document.getElementById('feedback').innerText = '';
        hasErrored = false;
        
        enToZh = Math.random() > 0.5;
        currentItem = vocabData[Math.floor(Math.random() * vocabData.length)];

        document.getElementById('q-text').innerHTML = enToZh ? `<span class="pos">${currentItem.pos}</span>${currentItem.en}` : currentItem.zh;
        document.getElementById('q-ipa').innerText = enToZh ? currentItem.ipa : "";

        if (document.getElementById('voice-toggle').checked) speak(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');

        let opts = [currentItem];
        while(opts.length < 5) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.innerHTML = enToZh ? o.zh : `<span><span class="pos">${o.pos}</span>${o.en}</span><span class="ipa">${o.ipa}</span>`;
            btn.onclick = () => {
                if (o === currentItem) {
                    btn.classList.add('correct');
                    document.getElementById('feedback').innerText = "✅ 正確！";
                    if (!hasErrored) score++;
                    total++;
                    document.getElementById('correct-count').innerText = score;
                    document.getElementById('total-count').innerText = total;
                    document.querySelectorAll('.options button').forEach(b => b.disabled = true);
                    document.getElementById('next-button').style.display = 'block';
                    document.getElementById('exit-button').style.display = 'none';
                    if (document.getElementById('voice-toggle').checked) speak(enToZh ? currentItem.zh : currentItem.en, enToZh ? 'zh' : 'en');
                } else {
                    btn.classList.add('wrong');
                    btn.disabled = true;
                    hasErrored = true;
                    document.getElementById('feedback').innerText = "❌ 再試一次！";
                }
            };
            container.appendChild(btn);
        });
    }

    function speak(txt, lang) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = lang === 'en' ? 'en-US' : 'zh-TW';
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
