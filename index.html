<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌詞挑戰 v13</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .score-box { font-size: 1em; margin-bottom: 15px; color: #555; background: #eef; padding: 8px; border-radius: 10px; }
        .question { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; min-height: 70px; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .ipa { font-size: 0.7em; color: #888; font-weight: normal; margin-top: 5px; }
        .pos { color: #1a73e8; font-size: 0.8em; font-style: italic; margin-right: 5px; }
        .speaker-btn { background: #e8f0fe; border: 2px solid #4285f4; border-radius: 50%; width: 60px; height: 60px; font-size: 1.6em; cursor: pointer; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; }
        #options-area { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 15px; }
        .option-btn { padding: 15px; font-size: 1em; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; width: 100%; box-sizing: border-box; }
        .start-btn { background: #4285f4 !important; color: white !important; border: none; padding: 20px; font-size: 1.5em; font-weight: bold; border-radius: 15px; cursor: pointer; width: 80%; }
        .next-btn { background: #34a853 !important; color: white !important; border: none; padding: 18px; font-weight: bold; margin-bottom: 10px; font-size: 1.2em; display: none; border-radius: 12px; }
        #debug-info { font-size: 0.7em; color: #999; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <h2 style="color:#4285f4; margin-top:0;">Every Teardrop<br>歌詞挑戰 v13</h2>
        <p style="color:#666;">語音引擎重新初始化版</p>
        <button id="real-start-btn" class="start-btn">點我開始 🚀</button>
    </div>

    <div id="main-game">
        <div class="score-box">答對數: <span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <div class="question">
            <div id="q-text">準備中...</div>
            <div id="q-ipa" class="ipa"></div>
        </div>
        <button class="speaker-btn" id="manual-speak">🔊</button>
        <div id="options-area"></div>
        <div id="feedback" style="margin-bottom:10px; font-weight:bold; height:20px; color:#e67e22;"></div>
        <button id="next-button" class="next-btn">下一題 ➔</button>
        
        <div id="debug-info">系統診斷: 準備就緒</div>
    </div>
</div>

<script>
(function() {
    const vocabData = [
        { en: "Favorite", pos: "adj.", ipa: "/ˈfeɪvərɪt/", zh: "最喜愛的" },
        { en: "In the black", pos: "phr.", ipa: "/ɪn ðə blæk/", zh: "身處黑暗/處於盈利" },
        { en: "Shut the world outside", pos: "phr.", ipa: "/ʃʌt ðə wɜːrld ˌaʊtˈsaɪd/", zh: "將世界關在門外" },
        { en: "On a roll", pos: "phr.", ipa: "/ɒn ə roʊl/", zh: "氣勢正旺/進展順利" },
        { en: "Alight", pos: "adj.", ipa: "/əˈlaɪt/", zh: "照亮的/燃燒著的" },
        { en: "Rubble", pos: "n.", ipa: "/ˈrʌbl/", zh: "瓦礫/碎石殘骸" },
        { en: "Rebel", pos: "adj./n.", ipa: "/ˈrebl/", zh: "反抗的/造反者" },
        { en: "Comma", pos: "n.", ipa: "/ˈkɒmə/", zh: "逗號" },
        { en: "Full stop", pos: "n.", ipa: "/fʊl stɒp/", zh: "句點/終點" },
        { en: "Trapeze", pos: "n.", ipa: "/trəˈpiːz/", zh: "高空鞦韆" },
        { en: "Cathedral", pos: "n.", ipa: "/kəˈθiːdrəl/", zh: "大教堂" },
        { en: "Siren", pos: "n.", ipa: "/ˈsaɪrən/", zh: "警笛/汽笛" },
        { en: "Symphony", pos: "n.", ipa: "/ˈsɪmfəni/", zh: "交響樂" },
        { en: "Emerge", pos: "v.", ipa: "/iˈmɜːrdʒ/", zh: "浮現/走出來" },
        { en: "Raise the flag", pos: "phr.", ipa: "/reɪz ðə flæɡ/", zh: "升起旗幟/不屈服" },
        { en: "Generation", pos: "n.", ipa: "/ˌdʒenəˈreɪʃn/", zh: "世代" },
        { en: "Blink", pos: "v.", ipa: "/blɪŋk/", zh: "眨眼" },
        { en: "Soar", pos: "v.", ipa: "/sɔːr/", zh: "翱翔/飛揚" },
        { en: "Waterfall", pos: "n.", ipa: "/ˈwɔːtərfɔːl/", zh: "瀑布" },
        { en: "Pulse", pos: "n.", ipa: "/pʌls/", zh: "脈搏/律動" }
    ];

    let score = 0, total = 0, currentItem = {}, enToZh = true;
    const debug = document.getElementById('debug-info');

    function speakText(txt, lang) {
        if (!window.speechSynthesis) {
            debug.innerText = "診斷: 瀏覽器不支援語音";
            return;
        }

        // 強制重置語音引擎
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(txt);
        utterance.lang = (lang === 'en') ? 'en-US' : 'zh-TW';
        utterance.rate = 0.9;
        utterance.volume = 1.0;

        utterance.onstart = () => debug.innerText = "診斷: 正在播放 - " + txt;
        utterance.onerror = (e) => debug.innerText = "診斷: 語音錯誤 (" + e.error + ")";

        window.speechSynthesis.speak(utterance);
    }

    document.getElementById('real-start-btn').onclick = function() {
        document.getElementById('start-screen').style.display = 'none';
        renderQuestion();
        // 第一次啟動必須在點擊事件內
        speakText("Start Test", "en");
    };

    document.getElementById('manual-speak').onclick = function() {
        speakText(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');
    };

    document.getElementById('next-button').onclick = renderQuestion;

    function renderQuestion() {
        const area = document.getElementById('options-area');
        document.getElementById('next-button').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        
        enToZh = Math.random() > 0.5;
        currentItem = vocabData[Math.floor(Math.random() * vocabData.length)];

        document.getElementById('q-text').innerHTML = enToZh ? `<span class="pos">${currentItem.pos}</span>${currentItem.en}` : currentItem.zh;
        document.getElementById('q-ipa').innerText = enToZh ? currentItem.ipa : "";

        // 出題後自動嘗試朗讀
        setTimeout(() => {
            speakText(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');
        }, 300);

        let opts = [currentItem];
        while(opts.length < 5) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        area.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = enToZh ? o.zh : `<span><span class="pos">${o.pos}</span>${o.en}</span>`;
            
            btn.onclick = function() {
                if (o === currentItem) {
                    this.style.borderColor = '#2ecc71';
                    this.style.background = '#e8f5e9';
                    document.getElementById('feedback').innerText = "✅ Excellent!";
                    score++; total++;
                    document.getElementById('correct-count').innerText = score;
                    document.getElementById('total-count').innerText = total;
                    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                    document.getElementById('next-button').style.display = 'block';
                    speakText(enToZh ? currentItem.zh : currentItem.en, enToZh ? 'zh' : 'en');
                } else {
                    this.style.borderColor = '#e74c3c';
                    this.style.background = '#ffebee';
                    document.getElementById('feedback').innerText = "❌ Try again!";
                }
            };
            area.appendChild(btn);
        });
    }
})();
</script>
</body>
</html>
