<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌詞挑戰 v8</title>
    <style>
        body { font-family: 'Microsoft JhengHei', -apple-system, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; position: relative; display: flex; flex-direction: column; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .score-box { font-size: 1em; margin-bottom: 15px; color: #555; background: #eef; padding: 8px; border-radius: 10px; }
        .question { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; min-height: 70px; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .ipa { font-size: 0.7em; color: #888; font-weight: normal; margin-top: 5px; }
        .pos { color: #1a73e8; font-size: 0.8em; font-style: italic; margin-right: 5px; }
        
        /* 語音按鈕樣式 */
        .speaker-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2em; cursor: pointer; margin-bottom: 15px; align-self: center; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .speaker-btn:active { background: #e2e6ea; transform: scale(0.9); }

        #options-area { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-bottom: 15px; }
        .option-btn { padding: 15px; font-size: 1em; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
        .start-btn { background: #4285f4 !important; color: white !important; border: none !important; padding: 20px; font-size: 1.5em; font-weight: bold; border-radius: 15px; cursor: pointer; width: 80%; }
        .next-btn { background: #34a853 !important; color: white !important; border: none !important; padding: 18px; font-weight: bold; margin-bottom: 10px; font-size: 1.2em; display: none; border-radius: 12px; }
        .exit-btn { background: #ff4757 !important; color: white !important; border: none !important; padding: 12px; font-weight: bold; border-radius: 12px; font-size: 1em; cursor: pointer; width: 100%; }
        .correct { border-color: #2ecc71 !important; background: #e8f5e9 !important; color: #27ae60 !important; }
        .wrong { border-color: #e74c3c !important; background: #ffebee !important; color: #c0392b !important; }
        #feedback { margin-bottom: 10px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <h2 style="color:#4285f4; margin-top:0;">Every Teardrop<br>歌詞挑戰 v8</h2>
        <p style="color:#666;">點擊開始並測試語音</p>
        <button id="real-start-btn" class="start-btn">開始挑戰 🚀</button>
    </div>

    <div id="main-game">
        <div class="score-box">答對數 / 總題數: <span id="correct-count">0</span> / <span id="total-count">0</span></div>
        
        <div class="question">
            <div id="q-text">載入中...</div>
            <div id="q-ipa" class="ipa"></div>
        </div>

        <button class="speaker-btn" onclick="playCurrentVocab()" title="聽發音">🔊</button>

        <div id="options-area"></div>
        <div id="feedback"></div>
        <button id="next-button" class="next-btn">繼續下一題 ➔</button>
        <button id="exit-button" class="exit-btn">結束練習 🏁</button>
    </div>
</div>

<script>
(function() {
    const vocabData = [
        { en: "Favorite", pos: "adj.", ipa: "/ˈfeɪvərɪt/", zh: "最喜愛的" },
        { en: "In the black", pos: "phr.", ipa: "/ɪn ðə blæk/", zh: "身處黑暗/處於盈利" },
        { en: "Shut the world outside", pos: "phr.", ipa: "/ʃʌt ðə wɜːrld ˌaʊtˈsaɪd/", zh: "將世界關在門外" },
        { en: "On a roll", pos: "phr.", ipa: "/ɒn ə roʊl/", zh: "氣勢正旺/進展順利" },
        { en: "Alight", pos: "adj.", ipa: "/əˈlaɪt/", zh: "照亮的/燃燒著的" },
        { en: "Rubble", pos: "n.", ipa: "/ˈrʌbl/", zh: "瓦礫/碎石殘骸" },
        { en: "Rebel", pos: "adj./n.", ipa: "/ˈrebl/", zh: "反抗的/造反者" },
        { en: "Comma", pos: "n.", ipa: "/ˈkɒmə/", zh: "逗號" },
        { en: "Full stop", pos: "n.", ipa: "/fʊl stɒp/", zh: "句點/終點" },
        { en: "Trapeze", pos: "n.", ipa: "/trəˈpiːz/", zh: "高空鞦韆" },
        { en: "Cathedral", pos: "n.", ipa: "/kəˈθiːdrəl/", zh: "大教堂" },
        { en: "Siren", pos: "n.", ipa: "/ˈsaɪrən/", zh: "警笛/汽笛" },
        { en: "Symphony", pos: "n.", ipa: "/ˈsɪmfəni/", zh: "交響樂" },
        { en: "Emerge", pos: "v.", ipa: "/iˈmɜːrdʒ/", zh: "浮現/走出來" },
        { en: "Raise the flag", pos: "phr.", ipa: "/reɪz ðə flæɡ/", zh: "升起旗幟/不屈服" },
        { en: "Generation", pos: "n.", ipa: "/ˌdʒenəˈreɪʃn/", zh: "世代" },
        { en: "Blink", pos: "v.", ipa: "/blɪŋk/", zh: "眨眼" },
        { en: "Soar", pos: "v.", ipa: "/sɔːr/", zh: "翱翔/飛揚" },
        { en: "Waterfall", pos: "n.", ipa: "/ˈwɔːtərfɔːl/", zh: "瀑布" },
        { en: "Pulse", pos: "n.", ipa: "/pʌls/", zh: "脈搏/律動" }
    ];

    let score = 0, total = 0, currentItem = {}, enToZh = true, hasErrored = false;

    function speak(txt, lang) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel(); 
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = lang === 'en' ? 'en-US' : 'zh-TW';
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    // 全域函數讓按鈕可以呼叫
    window.playCurrentVocab = function() {
        speak(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');
    };

    document.getElementById('real-start-btn').addEventListener('click', function() {
        speak("Welcome", "en"); // 點擊當下立即解鎖語音
        document.getElementById('start-screen').style.display = 'none';
        renderQuestion();
    });

    document.getElementById('next-button').addEventListener('click', renderQuestion);
    document.getElementById('exit-button').addEventListener('click', function() {
        const rate = total === 0 ? 0 : Math.round((score / total) * 100);
        alert(`測驗結束！\n得分：${score} / ${total}\n正確率：${rate}%`);
        location.reload();
    });

    function renderQuestion() {
        const area = document.getElementById('options-area');
        document.getElementById('next-button').style.display = 'none';
        document.getElementById('exit-button').style.display = 'block';
        document.getElementById('feedback').innerText = '';
        hasErrored = false;
        
        enToZh = Math.random() > 0.5;
        currentItem = vocabData[Math.floor(Math.random() * vocabData.length)];

        document.getElementById('q-text').innerHTML = enToZh ? `<span class="pos">${currentItem.pos}</span>${currentItem.en}` : currentItem.zh;
        document.getElementById('q-ipa').innerText = enToZh ? currentItem.ipa : "";

        // 嘗試自動朗讀
        speak(enToZh ? currentItem.en : currentItem.zh, enToZh ? 'en' : 'zh');

        let opts = [currentItem];
        while(opts.length < 5) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        area.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = enToZh ? o.zh : `<span><span class="pos">${o.pos}</span>${o.en}</span><span class="ipa">${o.ipa}</span>`;
            
            btn.onclick = function() {
                if (o === currentItem) {
                    btn.classList.add('correct');
                    document.getElementById('feedback').innerText = "✅ 正獲！";
                    if (!hasErrored) score++;
                    total++;
                    document.getElementById('correct-count').innerText = score;
                    document.getElementById('total-count').innerText = total;
                    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                    document.getElementById('next-button').style.display = 'block';
                    document.getElementById('exit-button').style.display = 'none';
                    // 答對時手動觸發一次
                    speak(enToZh ? currentItem.zh : currentItem.en, enToZh ? 'zh' : 'en');
                } else {
                    btn.classList.add('wrong');
                    btn.disabled = true;
                    hasErrored = true;
                    document.getElementById('feedback').innerText = "❌ 再試一次！";
                }
            };
            area.appendChild(btn);
        });
    }
})();
</script>
</body>
</html>
